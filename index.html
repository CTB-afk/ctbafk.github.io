<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="image/logo.png" type="image/png">
    <title>Urban Mapping Studio</title>
  </head>
  <body>
    <main class="page">
      <div class="grid-bg" aria-hidden="true"></div>
      <div class="fade-bg" aria-hidden="true"></div>

      <div class="brand">
        <img src="image/logo.svg" alt="Urban" class="brand-logo">
        <p class="brand-tagline">
          Bring your server's 3D environment to life with top-tier quality.
        </p>
      </div>

      <div class="link-cards">

          target="_blank"
          rel="noopener noreferrer"
          class="card-link"
        >

              </svg>
              <h2 class="card-title">Discord</h2>
            </div>
            <p class="card-text">
              Join our community for updates, support, and exclusive previews.
            </p>
            <div class="card-cta">
              <svg class="card-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"></path>
              </svg>
              <span>Join Server</span>
            </div>
          </div>
        </a>

        <a
          href="http://urbans.tebex.io/"
          target="_blank"
          rel="noopener noreferrer"
          class="card-link"
        >
          <div class="card">
            <div class="card-header">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z"

              <h2 class="card-title">Tebex Store</h2>
            </div>
            <p class="card-text">
              Browse our collection of premium maps and custom interiors.
            </p>
            <div class="card-cta">
              <svg class="card-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"></path>
              </svg>
              <span>Visit Store</span>
            </div>
          </div>
        </a>
      </div>

      <footer class="footer">
        © <span id="year"></span> Urban Mapping Studio
      </footer>
    </main>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
